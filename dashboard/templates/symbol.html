<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ base }}/THB — Symbol Detail</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2129;
      --surface-2: #232c37;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #8b6fff;
      --up: #16c784;
      --down: #ea3943;
      --border: #2a323d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 18px;
    }
    header h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
    header a { color: var(--muted); text-decoration: none; font-size: 13px; }
    header a:hover { color: var(--accent); }
    main { padding: 24px 28px; }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 8px; }
    .controls .btn {
      padding: 6px 12px;
      border-radius: 6px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      border: 1px solid var(--border);
      user-select: none;
    }
    .controls .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .card h3 {
      margin: 0 0 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #chart { width: 100%; height: 420px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 6px 10px; text-align: right; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; }
    .up { color: var(--up); }
    .down { color: var(--down); }
    .empty-msg { color: var(--muted); padding: 16px; text-align: center; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>{{ base }}/THB</h1>
    <a href="/">← back to dashboard</a>
  </header>
  <main>
    <div class="controls">
      <label>Venue</label>
      <span class="btn active" data-venue="bitkub">Bitkub</span>
      <span class="btn" data-venue="binance_th">Binance TH</span>
      <span class="btn" data-venue="upbit_th">Upbit TH</span>
      <span style="margin-left:24px"></span>
      <label>Interval</label>
      <span class="btn" data-interval="1h">1h</span>
      <span class="btn" data-interval="4h">4h</span>
      <span class="btn active" data-interval="1d">1d</span>
      <span class="btn" data-interval="1w">1w</span>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Candles + Volume</h3>
        <div id="chart"></div>
        <div id="chart-empty" class="empty-msg" style="display:none">No bars returned for this venue/interval.</div>
      </div>
      <div class="card">
        <h3>Cross-Venue Volume Trend (CoinGecko, 14d)</h3>
        <table id="vol-tbl"><thead><tr><th>Venue</th><th>Avg BTC/day</th><th>Latest</th></tr></thead><tbody></tbody></table>
        <div id="vol-empty" class="empty-msg">Loading...</div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const BASE = {{ base | tojson }};
    let venue = "bitkub";
    let interval = "1d";
    let chart, candleSeries, volumeSeries;

    function initChart() {
      const el = document.getElementById("chart");
      el.replaceChildren();
      chart = LightweightCharts.createChart(el, {
        layout: { background: { color: "#1a2129" }, textColor: "#e6edf3" },
        grid: { vertLines: { color: "#232c37" }, horzLines: { color: "#232c37" } },
        timeScale: { borderColor: "#2a323d", timeVisible: true, secondsVisible: false },
        rightPriceScale: { borderColor: "#2a323d" },
        crosshair: { mode: 1 },
        height: 420,
      });
      candleSeries = chart.addCandlestickSeries({
        upColor: "#16c784", downColor: "#ea3943",
        borderUpColor: "#16c784", borderDownColor: "#ea3943",
        wickUpColor: "#16c784", wickDownColor: "#ea3943",
      });
      volumeSeries = chart.addHistogramSeries({
        priceFormat: { type: "volume" },
        priceScaleId: "vol",
        color: "#8b6fff",
      });
      chart.priceScale("vol").applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
    }

    async function loadKlines() {
      const r = await fetch(`/api/klines/${venue}/${BASE}?interval=${interval}&limit=200`);
      const d = await r.json();
      const bars = (d.bars || []).filter(b => b.open != null);
      const empty = document.getElementById("chart-empty");
      if (!bars.length) {
        empty.style.display = "block";
        if (candleSeries) candleSeries.setData([]);
        if (volumeSeries) volumeSeries.setData([]);
        return;
      }
      empty.style.display = "none";
      const candles = bars.map(b => ({
        time: Math.floor(b.ts_ms / 1000),
        open: b.open, high: b.high, low: b.low, close: b.close,
      }));
      const vols = bars.map(b => ({
        time: Math.floor(b.ts_ms / 1000),
        value: b.base_volume || 0,
        color: b.close >= b.open ? "rgba(22,199,132,0.5)" : "rgba(234,57,67,0.5)",
      }));
      candleSeries.setData(candles);
      volumeSeries.setData(vols);
      chart.timeScale().fitContent();
    }

    async function loadVolumeCharts() {
      const tbody = document.querySelector("#vol-tbl tbody");
      const empty = document.getElementById("vol-empty");
      tbody.replaceChildren();
      const venues = ["bitazza", "orbix_cg"];
      const results = await Promise.all(venues.map(v =>
        fetch(`/api/volume_chart/${v}?days=14`).then(r => r.json()).catch(() => null)
      ));
      const rows = [];
      results.forEach((d, i) => {
        if (!d || !(d.series || []).length) return;
        const vals = d.series.map(p => p.volume_btc).filter(v => v != null);
        const avg = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
        const latest = vals[vals.length - 1] || 0;
        const tr = document.createElement("tr");
        const cells = [venues[i], avg.toFixed(2), latest.toFixed(2)];
        cells.forEach(c => {
          const td = document.createElement("td");
          td.textContent = c;
          tr.appendChild(td);
        });
        rows.push(tr);
      });
      if (rows.length) {
        empty.style.display = "none";
        tbody.replaceChildren(...rows);
      } else {
        empty.textContent = "No volume_chart data available.";
      }
    }

    document.querySelectorAll(".btn[data-venue]").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".btn[data-venue]").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        venue = b.dataset.venue;
        loadKlines();
      });
    });
    document.querySelectorAll(".btn[data-interval]").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll(".btn[data-interval]").forEach(x => x.classList.remove("active"));
        b.classList.add("active");
        interval = b.dataset.interval;
        loadKlines();
      });
    });

    initChart();
    loadKlines();
    loadVolumeCharts();
  </script>
</body>
</html>
